<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f14"/>
      <stop offset="100%" style="stop-color:#0c1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#22d3ee"/>
    </linearGradient>
    <radialGradient id="glow1" cx="70%" cy="30%" r="40%">
      <stop offset="0%" style="stop-color:#0891b2;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="15%" cy="75%" r="35%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0"/>
    </radialGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="3"/></filter>
  </defs>

  <rect width="960" height="540" fill="url(#bg)"/>
  <rect width="960" height="540" fill="url(#glow1)"/>
  <rect width="960" height="540" fill="url(#glow2)"/>

  <!-- Grid lines -->
  <g opacity="0.06" stroke="#06b6d4" stroke-width="1">
    <line x1="0" y1="108" x2="960" y2="108"/>
    <line x1="0" y1="216" x2="960" y2="216"/>
    <line x1="0" y1="324" x2="960" y2="324"/>
    <line x1="0" y1="432" x2="960" y2="432"/>
    <line x1="192" y1="0" x2="192" y2="540"/>
    <line x1="384" y1="0" x2="384" y2="540"/>
    <line x1="576" y1="0" x2="576" y2="540"/>
    <line x1="768" y1="0" x2="768" y2="540"/>
  </g>

  <!-- Agent nodes -->
  <g transform="translate(580,160)">
    <circle cx="0" cy="0" r="48" fill="none" stroke="#06b6d4" stroke-width="1.5" opacity="0.4"/>
    <circle cx="0" cy="0" r="36" fill="#0891b2" opacity="0.15"/>
    <circle cx="0" cy="0" r="8" fill="#22d3ee" opacity="0.9"/>
    <text x="0" y="68" text-anchor="middle" fill="#67e8f9" font-family="monospace" font-size="11" opacity="0.7">retrieval</text>
  </g>
  <g transform="translate(700,270)">
    <circle cx="0" cy="0" r="40" fill="none" stroke="#8b5cf6" stroke-width="1.5" opacity="0.35"/>
    <circle cx="0" cy="0" r="28" fill="#7c3aed" opacity="0.12"/>
    <circle cx="0" cy="0" r="7" fill="#a78bfa" opacity="0.9"/>
    <text x="0" y="58" text-anchor="middle" fill="#c4b5fd" font-family="monospace" font-size="11" opacity="0.7">synthesis</text>
  </g>
  <g transform="translate(640,370)">
    <circle cx="0" cy="0" r="36" fill="none" stroke="#10b981" stroke-width="1.5" opacity="0.35"/>
    <circle cx="0" cy="0" r="24" fill="#059669" opacity="0.12"/>
    <circle cx="0" cy="0" r="6" fill="#34d399" opacity="0.9"/>
    <text x="0" y="52" text-anchor="middle" fill="#6ee7b7" font-family="monospace" font-size="11" opacity="0.7">ranking</text>
  </g>
  <!-- Connecting lines -->
  <line x1="580" y1="196" x2="700" y2="232" stroke="#06b6d4" stroke-width="1" opacity="0.25" stroke-dasharray="4 4"/>
  <line x1="700" y1="308" x2="640" y2="334" stroke="#8b5cf6" stroke-width="1" opacity="0.25" stroke-dasharray="4 4"/>
  <line x1="580" y1="208" x2="640" y2="334" stroke="#10b981" stroke-width="1" opacity="0.2" stroke-dasharray="4 4"/>

  <!-- FAISS vector viz -->
  <g transform="translate(820,200)" opacity="0.5">
    <rect x="-30" y="-4" width="60" height="8" rx="2" fill="#06b6d4" opacity="0.5"/>
    <rect x="-30" y="12" width="45" height="8" rx="2" fill="#06b6d4" opacity="0.35"/>
    <rect x="-30" y="28" width="52" height="8" rx="2" fill="#06b6d4" opacity="0.25"/>
    <rect x="-30" y="44" width="38" height="8" rx="2" fill="#06b6d4" opacity="0.2"/>
    <text x="0" y="72" text-anchor="middle" fill="#67e8f9" font-family="monospace" font-size="10" opacity="0.6">FAISS</text>
  </g>

  <!-- Left content -->
  <text x="60" y="180" fill="#67e8f9" font-family="monospace" font-size="12" opacity="0.5">// multi-agent pipeline</text>
  <text x="60" y="240" fill="#f8fafc" font-family="system-ui,sans-serif" font-size="52" font-weight="700" letter-spacing="-1">Deep Researcher</text>
  <text x="60" y="290" fill="#f8fafc" font-family="system-ui,sans-serif" font-size="52" font-weight="700" letter-spacing="-1">RAG System</text>
  <rect x="60" y="312" width="200" height="3" rx="1.5" fill="url(#accent)"/>
  <text x="60" y="352" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="18">Multi-agent research pipeline with LLM synthesis</text>

  <!-- Tech badges -->
  <g transform="translate(60, 395)">
    <rect x="0" y="0" width="76" height="28" rx="14" fill="#164e63" stroke="#06b6d4" stroke-width="1" opacity="0.8"/>
    <text x="38" y="18" text-anchor="middle" fill="#67e8f9" font-family="monospace" font-size="12" font-weight="600">Python</text>
  </g>
  <g transform="translate(148, 395)">
    <rect x="0" y="0" width="98" height="28" rx="14" fill="#1e1b4b" stroke="#8b5cf6" stroke-width="1" opacity="0.8"/>
    <text x="49" y="18" text-anchor="middle" fill="#c4b5fd" font-family="monospace" font-size="12" font-weight="600">LangChain</text>
  </g>
  <g transform="translate(258, 395)">
    <rect x="0" y="0" width="70" height="28" rx="14" fill="#064e3b" stroke="#10b981" stroke-width="1" opacity="0.8"/>
    <text x="35" y="18" text-anchor="middle" fill="#6ee7b7" font-family="monospace" font-size="12" font-weight="600">FAISS</text>
  </g>
</svg>
