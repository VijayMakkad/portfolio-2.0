<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540">
  <defs>
    <linearGradient id="ats-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0f14"/>
      <stop offset="100%" stop-color="#0f0a1e"/>
    </linearGradient>
    <linearGradient id="ats-accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="ats-bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="960" height="540" fill="url(#ats-bg)"/>

  <!-- Pink/purple glow -->
  <circle cx="700" cy="160" r="200" fill="#ec4899" opacity="0.07"/>

  <!-- Right side: transformation visual -->
  <!-- Input document card -->
  <rect x="510" y="80" width="180" height="260" rx="14" fill="#111827" stroke="#2d1b4e" stroke-width="1.5"/>
  <text x="600" y="108" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="10">INPUT TEXT</text>
  <!-- Text lines (longer) -->
  <rect x="528" y="120" width="145" height="8" rx="4" fill="#1e1b4b" opacity="0.9"/>
  <rect x="528" y="136" width="120" height="8" rx="4" fill="#1e1b4b" opacity="0.75"/>
  <rect x="528" y="152" width="138" height="8" rx="4" fill="#1e1b4b" opacity="0.85"/>
  <rect x="528" y="168" width="100" height="8" rx="4" fill="#1e1b4b" opacity="0.65"/>
  <rect x="528" y="184" width="132" height="8" rx="4" fill="#1e1b4b" opacity="0.8"/>
  <rect x="528" y="200" width="112" height="8" rx="4" fill="#1e1b4b" opacity="0.7"/>
  <rect x="528" y="216" width="140" height="8" rx="4" fill="#1e1b4b" opacity="0.85"/>
  <rect x="528" y="232" width="105" height="8" rx="4" fill="#1e1b4b" opacity="0.6"/>
  <rect x="528" y="248" width="125" height="8" rx="4" fill="#1e1b4b" opacity="0.75"/>
  <rect x="528" y="264" width="90" height="8" rx="4" fill="#1e1b4b" opacity="0.55"/>
  <!-- "..." indicator -->
  <text x="600" y="310" text-anchor="middle" fill="#475569" font-family="monospace" font-size="18">- - -</text>

  <!-- Arrow -->
  <line x1="700" y1="210" x2="748" y2="210" stroke="#a855f7" stroke-width="2.5"/>
  <polygon points="745,204 758,210 745,216" fill="#a855f7"/>
  <rect x="700" y="196" width="44" height="18" rx="6" fill="#2d1b4e"/>
  <text x="722" y="208" text-anchor="middle" fill="#c084fc" font-family="monospace" font-size="10" font-weight="600">BERT</text>

  <!-- Output summary card -->
  <rect x="760" y="120" width="160" height="130" rx="14" fill="#111827" stroke="#7c3aed" stroke-width="2"/>
  <text x="840" y="146" text-anchor="middle" fill="#a855f7" font-family="monospace" font-size="10">SUMMARY</text>
  <rect x="776" y="156" width="128" height="8" rx="4" fill="#4c1d95" opacity="0.9"/>
  <rect x="776" y="172" width="105" height="8" rx="4" fill="#4c1d95" opacity="0.75"/>
  <rect x="776" y="188" width="118" height="8" rx="4" fill="#4c1d95" opacity="0.85"/>
  <rect x="776" y="204" width="88" height="8" rx="4" fill="#4c1d95" opacity="0.65"/>
  <text x="840" y="234" text-anchor="middle" fill="#6ee7b7" font-family="monospace" font-size="11">? 85% compressed</text>

  <!-- Compression arrow -->
  <line x1="840" y1="258" x2="840" y2="300" stroke="#6d28d9" stroke-width="1.5" stroke-dasharray="4 2"/>
  <polygon points="834,297 840,310 846,297" fill="#6d28d9"/>

  <!-- Compression stat -->
  <rect x="786" y="318" width="108" height="40" rx="10" fill="#1a0a2e" stroke="#7c3aed" stroke-width="1"/>
  <text x="840" y="336" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="10">INPUT ? OUTPUT</text>
  <text x="840" y="352" text-anchor="middle" fill="#c084fc" font-family="system-ui, sans-serif" font-size="14" font-weight="700">1200 ? 180 words</text>

  <!-- Left side: main text -->
  <text x="60" y="165" fill="#ec4899" font-family="monospace" font-size="13" opacity="0.65">// nlp summarization</text>

  <text x="60" y="228" fill="#f8fafc" font-family="system-ui, sans-serif" font-size="52" font-weight="700">AI Text</text>
  <text x="60" y="286" fill="#f8fafc" font-family="system-ui, sans-serif" font-size="52" font-weight="700">Summarization</text>

  <rect x="60" y="304" width="184" height="3" rx="2" fill="url(#ats-accent)"/>

  <text x="60" y="348" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="17">BERT extractive + abstractive NLP</text>

  <!-- Stats -->
  <text x="60" y="405" fill="#ec4899" font-family="system-ui, sans-serif" font-size="30" font-weight="700">85%</text>
  <text x="60" y="422" fill="#64748b" font-family="monospace" font-size="10">COMPRESSION</text>
  <text x="155" y="405" fill="#ec4899" font-family="system-ui, sans-serif" font-size="30" font-weight="700">BERT</text>
  <text x="155" y="422" fill="#64748b" font-family="monospace" font-size="10">MODEL</text>
  <text x="240" y="405" fill="#ec4899" font-family="system-ui, sans-serif" font-size="30" font-weight="700">NLP</text>
  <text x="240" y="422" fill="#64748b" font-family="monospace" font-size="10">PIPELINE</text>

  <!-- Tech badges -->
  <rect x="60" y="448" width="118" height="28" rx="14" fill="#2d1b69" stroke="#a855f7" stroke-width="1"/>
  <text x="119" y="466" text-anchor="middle" fill="#d8b4fe" font-family="monospace" font-size="12" font-weight="600">HuggingFace</text>

  <rect x="190" y="448" width="72" height="28" rx="14" fill="#1c1917" stroke="#f97316" stroke-width="1"/>
  <text x="226" y="466" text-anchor="middle" fill="#fb923c" font-family="monospace" font-size="12" font-weight="600">BERT</text>

  <rect x="274" y="448" width="88" height="28" rx="14" fill="#172554" stroke="#3b82f6" stroke-width="1"/>
  <text x="318" y="466" text-anchor="middle" fill="#93c5fd" font-family="monospace" font-size="12" font-weight="600">FastAPI</text>
</svg>
