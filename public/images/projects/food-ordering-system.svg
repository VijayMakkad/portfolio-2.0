<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f14"/>
      <stop offset="100%" style="stop-color:#0d1a10"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#22d3ee"/>
    </linearGradient>
    <radialGradient id="glow" cx="65%" cy="35%" r="42%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <rect width="960" height="540" fill="url(#bg)"/>
  <rect width="960" height="540" fill="url(#glow)"/>

  <!-- Order card UI -->
  <g transform="translate(560, 110)">
    <rect x="0" y="0" width="340" height="300" rx="16" fill="#111827" stroke="#1e3a2a" stroke-width="1"/>
    <!-- Header -->
    <rect x="0" y="0" width="340" height="50" rx="16" fill="#0f2d1a"/>
    <rect x="0" y="34" width="340" height="16" fill="#0f2d1a"/>
    <text x="20" y="30" fill="#4ade80" font-family="system-ui,sans-serif" font-size="14" font-weight="600">???  Order #1042</text>
    <circle cx="310" cy="25" r="10" fill="#22c55e" opacity="0.2"/>
    <circle cx="310" cy="25" r="5" fill="#22c55e"/>

    <!-- Menu items -->
    <g transform="translate(20, 70)">
      <!-- Item 1 -->
      <rect x="0" y="0" width="56" height="56" rx="10" fill="#1a2a1a"/>
      <text x="28" y="36" text-anchor="middle" font-size="26">??</text>
      <text x="70" y="18" fill="#e2e8f0" font-family="system-ui" font-size="13" font-weight="600">Margherita Pizza</text>
      <text x="70" y="36" fill="#64748b" font-family="monospace" font-size="11">Qty: 2</text>
      <text x="250" y="28" fill="#4ade80" font-family="system-ui" font-size="14" font-weight="700">$24.00</text>
    </g>
    <g transform="translate(20, 148)">
      <!-- Item 2 -->
      <rect x="0" y="0" width="56" height="56" rx="10" fill="#1a2a1a"/>
      <text x="28" y="36" text-anchor="middle" font-size="26">??</text>
      <text x="70" y="18" fill="#e2e8f0" font-family="system-ui" font-size="13" font-weight="600">Caesar Salad</text>
      <text x="70" y="36" fill="#64748b" font-family="monospace" font-size="11">Qty: 1</text>
      <text x="250" y="28" fill="#4ade80" font-family="system-ui" font-size="14" font-weight="700">$12.00</text>
    </g>

    <!-- Divider -->
    <line x1="20" y1="220" x2="320" y2="220" stroke="#1e3a2a" stroke-width="1"/>

    <!-- Total -->
    <text x="20" y="248" fill="#94a3b8" font-family="system-ui" font-size="13">Subtotal</text>
    <text x="280" y="248" fill="#94a3b8" font-family="system-ui" font-size="13">$36.00</text>
    <text x="20" y="272" fill="#f8fafc" font-family="system-ui" font-size="15" font-weight="700">Total</text>
    <text x="260" y="272" fill="#4ade80" font-family="system-ui" font-size="16" font-weight="700">$39.99</text>
  </g>

  <!-- Status tracker -->
  <g transform="translate(570, 430)" opacity="0.8">
    <circle cx="0" cy="0" r="8" fill="#22c55e"/>
    <text x="16" y="4" fill="#86efac" font-family="monospace" font-size="11">Confirmed</text>
    <line x1="70" y1="0" x2="100" y2="0" stroke="#1e3a2a" stroke-width="2"/>
    <circle cx="110" cy="0" r="8" fill="#1e3a2a" stroke="#22c55e" stroke-width="1.5"/>
    <text x="126" y="4" fill="#4ade80" font-family="monospace" font-size="11">Preparing</text>
    <line x1="196" y1="0" x2="226" y2="0" stroke="#1e2535" stroke-width="2"/>
    <circle cx="236" cy="0" r="8" fill="#1e2535" stroke="#374151" stroke-width="1.5"/>
    <text x="252" y="4" fill="#64748b" font-family="monospace" font-size="11">Delivered</text>
  </g>

  <!-- Left content -->
  <text x="60" y="175" fill="#4ade80" font-family="monospace" font-size="12" opacity="0.6">// full-stack ordering</text>
  <text x="60" y="235" fill="#f8fafc" font-family="system-ui,sans-serif" font-size="46" font-weight="700" letter-spacing="-1">Food Ordering</text>
  <text x="60" y="285" fill="#f8fafc" font-family="system-ui,sans-serif" font-size="46" font-weight="700" letter-spacing="-1">System</text>
  <rect x="60" y="302" width="160" height="3" rx="1.5" fill="url(#accent)"/>
  <text x="60" y="342" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="17">Spring Boot REST API + React frontend</text>

  <!-- Tech badges -->
  <g transform="translate(60, 385)">
    <rect x="0" y="0" width="100" height="28" rx="14" fill="#1c1917" stroke="#f97316" stroke-width="1" opacity="0.8"/>
    <text x="50" y="18" text-anchor="middle" fill="#fb923c" font-family="monospace" font-size="12" font-weight="600">Spring Boot</text>
  </g>
  <g transform="translate(172, 385)">
    <rect x="0" y="0" width="84" height="28" rx="14" fill="#1a1a2e" stroke="#6366f1" stroke-width="1" opacity="0.8"/>
    <text x="42" y="18" text-anchor="middle" fill="#a5b4fc" font-family="monospace" font-size="12" font-weight="600">React.js</text>
  </g>
  <g transform="translate(268, 385)">
    <rect x="0" y="0" width="82" height="28" rx="14" fill="#052e16" stroke="#22c55e" stroke-width="1" opacity="0.8"/>
    <text x="41" y="18" text-anchor="middle" fill="#86efac" font-family="monospace" font-size="12" font-weight="600">MySQL</text>
  </g>
</svg>
